[project]
name = "ai-empursh-backend"
version = "0.1.0"
description = "AI Desktop Companion — FastAPI backend"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "openai>=1.30.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
# Speech-to-text (faster-whisper + VAD)
stt = [
    "faster-whisper>=1.0.0",
]

# TTS — Microsoft Edge cloud (lightweight, no GPU)
tts-edge = [
    "edge-tts>=7.0.0",
]

# TTS — XTTS-v2 local voice cloning (heavy, needs GPU/CPU)
tts-xtts = [
    "TTS>=0.22.0",
    "torch>=2.0.0",
    "numpy>=1.24.0",
]

# Full install (everything)
full = [
    "faster-whisper>=1.0.0",
    "edge-tts>=7.0.0",
    "TTS>=0.22.0",
    "torch>=2.0.0",
    "numpy>=1.24.0",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
]
